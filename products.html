<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Mahiverse Globle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Cart Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <h2>Mahiverse Globle</h2>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="cart-icon-nav"><i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<section class="products">
    <h2>Our Products</h2>
    
    <div class="product-grid">
        <!-- PRODUCT 1: GARLIC POWDER -->
        <div class="card" data-id="garlic-powder" data-name="Garlic Powder">
            <img src="garlic.png.jpg" alt="Garlic Powder">
            <h3>Garlic Powder</h3>
            <p>Premium Quality Natural Powder</p>
            
            <div class="weight-selector-wrapper">
                <label for="weight-garlic">Select Weight:</label>
                <select id="weight-garlic" class="weight-select">
                    <option value="50g" data-price="0">50 gm</option>
                    <option value="200g" data-price="0">200 gm</option>
                    <option value="500g" data-price="0">500 gm</option>
                    <option value="1kg" data-price="0">1 kg</option>
                    <option value="Bulk" data-price="0">Above 1 kg (Bulk)</option>
                </select>
            </div>

            <button class="btn add-to-cart-btn"><i class="fas fa-cart-plus"></i> Add to Cart</button>
            
            <div class="marketplace-links">
                <a class="btn-sm flipkart" href="#" target="_blank">Flipkart</a>
                <a class="btn-sm meesho" href="#" target="_blank">Meesho</a>
            </div>
        </div>

        <!-- PRODUCT 2: RED ONION POWDER -->
        <div class="card" data-id="onion-powder" data-name="Red Onion Powder">
            <img src="onion.png.png" alt="Red Onion Powder">
            <h3>Red Onion Powder</h3>
            <p>Premium Quality Natural Powder</p>
            
            <div class="weight-selector-wrapper">
                <label for="weight-onion">Select Weight:</label>
                <select id="weight-onion" class="weight-select">
                    <option value="50g" data-price="0">50 gm</option>
                    <option value="200g" data-price="0">200 gm</option>
                    <option value="500g" data-price="0">500 gm</option>
                    <option value="1kg" data-price="0">1 kg</option>
                    <option value="Bulk" data-price="0">Above 1 kg (Bulk)</option>
                </select>
            </div>

            <button class="btn add-to-cart-btn"><i class="fas fa-cart-plus"></i> Add to Cart</button>
            
            <div class="marketplace-links">
                <a class="btn-sm flipkart" href="#" target="_blank">Flipkart</a>
                <a class="btn-sm meesho" href="#" target="_blank">Meesho</a>
            </div>
        </div>
    </div>
</section>

<!-- SLIDING CART SIDEBAR -->
<div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
        <h3>Your Shopping Cart</h3>
        <span id="close-cart" class="close-cart">&times;</span>
    </div>
    <div id="cart-items-container" class="cart-items-container">
        <!-- Items added dynamically by JavaScript -->
        <p class="empty-msg">Your cart is empty.</p>
    </div>
    <div class="cart-footer">
        <button id="whatsapp-checkout-btn" class="btn checkout-btn">
            <i class="fab fa-whatsapp"></i> Order & Pay via WhatsApp
        </button>
    </div>
</div>
<div id="cart-overlay" class="cart-overlay"></div>

<footer>
    <p>© 2026 Mahiverse Globle. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
